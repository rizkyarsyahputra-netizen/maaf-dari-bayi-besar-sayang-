<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Wish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(to bottom, #bae6fd, #e0f2fe); color: #334155; min-height: 100vh;
            font-family: sans-serif; overflow: hidden; position: relative;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 80px;
        }
        .star { position: absolute; font-size: 1.8rem; cursor: pointer; animation: bounce 1.2s infinite alternate ease-in-out; user-select: none; }
        @keyframes bounce { from { transform: translateY(0) scale(0.9); } to { transform: translateY(-10px) scale(1.1); } }
        .wish-alert {
            z-index: 10; background: white; border: 2px solid #38bdf8; padding: 20px; border-radius: 20px;
            max-width: 290px; width: 100%; text-align: center; box-shadow: 0 10px 25px rgba(14,165,233,0.1);
            opacity: 0; transform: scale(0.9); transition: 0.3s; pointer-events: none; margin-bottom: 35px; font-weight: bold; color: #0284c7;
        }
        .wish-alert.show { opacity: 1; transform: scale(1); pointer-events: auto; }
        .btn { z-index: 10; padding: 12px 35px; background: white; border: 2px solid #a855f7; color: #a855f7; border-radius: 50px; font-weight: bold; cursor: pointer; }
        #overlay-transisi { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #bae6fd; z-index: 9999; pointer-events: none; transition: opacity 0.8s ease; opacity: 1; }
    </style>
</head>
<body>
    <div id="overlay-transisi"></div>

    <div class="star" style="top:20%; left:15%; animation-delay:0s;">⭐</div>
    <div class="star" style="top:35%; left:75%; animation-delay:0.3s;">⭐</div>
    <div class="star" style="top:15%; left:60%; animation-delay:0.6s;">⭐</div>
    <div class="star" style="top:40%; left:30%; animation-delay:0.9s;">⭐</div>

    <div class="wish-alert" id="wa">Ketuk salah satu bintang di langitee sayangg... ✨</div>

    <button onclick="pindahHalaman('lastletter.html')" class="btn">halaman Terakhirrr 💖</button>

    <audio id="lagu" loop src="whisheslagu.mp3"></audio>

    <script>
        const wis = [
            "semoga sayangg selalu bahagiaaa yaaa",
            "kikyy mau kita  teruss barengg yaa",
            "maaciii udaaaa dengerin harapan kecil kikyyy",
            "semoga hubungan kita makin indaaa dan lucuuuu"
        ];
        const sts = document.querySelectorAll('.star');
        const wa = document.getElementById('wa');
        sts.forEach((st, idx) => {
            st.onclick = () => { wa.innerText = wis[idx]; wa.classList.add('show'); };
        });

        const lagu = document.getElementById('lagu');
        const overlay = document.getElementById('overlay-transisi');

        window.addEventListener('DOMContentLoaded', () => { setTimeout(() => { overlay.style.opacity = '0'; }, 100); });

        function playMusic() { 
            if(!lagu.paused) return;
            lagu.volume = 0;
            lagu.play().then(() => {
                let fi = setInterval(() => { if(lagu.volume < 0.4) lagu.volume += 0.02; else clearInterval(fi); }, 50);
            }).catch(() => {}); 
        }
        document.addEventListener('click', playMusic, {once:true});
        document.addEventListener('touchstart', playMusic, {once:true});

        function pindahHalaman(tuj) {
            overlay.style.opacity = '1';
            let fo = setInterval(() => {
                if(lagu.volume > 0.02) lagu.volume -= 0.02;
                else { clearInterval(fo); lagu.pause(); window.location.href = tuj; }
            }, 30);
        }
    </script>
</body>
</html>
