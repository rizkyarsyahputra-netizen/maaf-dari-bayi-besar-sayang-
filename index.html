<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Hope V3 Ultra - Sayangg</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #f3e8ff 100%);
            color: #334155; font-family: 'Segoe UI', sans-serif;
            min-height: 100vh; overflow: hidden; display: flex;
            justify-content: center; align-items: center; position: relative;
        }
        .aurora-cloud {
            position: absolute; top: -20%; left: -20%; width: 140%; height: 140%;
            background: radial-gradient(circle at 30% 30%, rgba(168, 85, 247, 0.2), transparent 40%),
                        radial-gradient(circle at 70% 60%, rgba(56, 189, 248, 0.2), transparent 50%);
            animation: float 10s infinite alternate ease-in-out; pointer-events: none;
        }
        @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(20px) scale(1.05); } }
        
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #e0f2fe; z-index: 999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
        .heartbeat-icon { font-size: 4.5rem; animation: pulse 1s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-bottom: 20px; cursor: pointer; }
        @keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.15); } }
        .progress-bar { width: 180px; height: 6px; background: rgba(255,255,255,0.8); border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #38bdf8, #a855f7); transition: width 0.1s; }
        
        .content { z-index: 10; text-align: center; padding: 25px; opacity: 0; transform: translateY(20px); transition: all 0.8s ease; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border-radius: 24px; border: 2px solid rgba(255,255,255,0.7); box-shadow: 0 10px 25px rgba(14, 165, 233, 0.1); max-width: 90%; }
        .content.show { opacity: 1; transform: translateY(0); }
        h1 { font-size: 2.2rem; color: #0369a1; margin-bottom: 12px; font-weight: 700; }
        p { color: #475569; margin-bottom: 25px; font-size: 1.05rem; font-weight: 500; }
        .btn-enter {
            padding: 14px 40px; background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: white; border-radius: 50px;
            border: none; display: inline-block; font-weight: bold; font-size: 1.05rem; cursor: pointer;
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3); transition: 0.3s;
        }
        .btn-enter:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4); }
        .info-music { font-size: 0.75rem; color: #64748b; margin-top: 15px; }

        #overlay-transisi { position: fixed; top:0; left:0; width:100%; height:100%; background:#e0f2fe; z-index:9999; pointer-events:none; transition:opacity 0.8s ease; opacity:0; }
    </style>
</head>
<body>
    <div id="overlay-transisi"></div>
    <div class="aurora-cloud"></div>

    <div id="loader">
        <div class="heartbeat-icon">🤍</div>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    </div>

    <div class="content" id="mainContent">
        <h1>Last Hope V3 Ultra ✨</h1>
        <p>Haii sayangg, banyaa hal yang mau kikyy sampaiin ke sayanhg... Dengerin yaaa? 🥺</p>
        <button onclick="pindahHalaman('surat.html')" class="btn-enter">Buka Sekaranggg 🥰</button>
        <div class="info-music">🎵 Ketuk di mana saja untuk memutar musik hangat...</div>
    </div>

    <audio id="lagu" loop src="awalan.mp3"></audio>

    <script>
        let w = 0;
        const fill = document.getElementById('fill');
        const loader = document.getElementById('loader');
        const content = document.getElementById('mainContent');
        const lagu = document.getElementById('lagu');
        const overlay = document.getElementById('overlay-transisi');

        function playMusic() { 
            lagu.volume = 0;
            lagu.play().then(() => {
                let fi = setInterval(() => { if(lagu.volume < 0.4) lagu.volume += 0.02; else clearInterval(fi); }, 50);
            }).catch(() => {}); 
        }
        document.addEventListener('click', playMusic, {once:true});
        document.addEventListener('touchstart', playMusic, {once:true});

        const iv = setInterval(() => {
            if (w >= 100) {
                clearInterval(iv);
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; content.classList.add('show'); playMusic(); }, 800);
            } else { w += 3; fill.style.width = w + '%'; }
        }, 40);

        function pindahHalaman(tuj) {
            overlay.style.opacity = '1';
            let fo = setInterval(() => {
                if(lagu.volume > 0.02) lagu.volume -= 0.02;
                else { clearInterval(fo); lagu.pause(); window.location.href = tuj; }
            }, 30);
        }
    </script>
</body>
</html>
